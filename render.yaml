services:
  # 1. The FastAPI Web Server
  - type: web
    name: catalog-ai-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - fromGroup: catalog-ai-env
      - key: WEB_CONCURRENCY
        value: 2

  # 2. The Celery Worker (Async Tasks)
  - type: worker
    name: catalog-ai-worker
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && celery -A app.celery worker --loglevel=info --pool=solo"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - fromGroup: catalog-ai-env

envVarGroups:
  - name: catalog-ai-env
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_REDIRECT_URI
        sync: false
      - key: HF_TOKEN
        sync: false
